# ============================================================
# Vuln-Agent Configuration (language-neutral)
# ============================================================
# System prompt and skills live in lang/ and skills/{lang}/
# This file: security mode, guardrails, tool toggles only.

# Security mode: "vulnerable" or "hardened"
security_mode: "vulnerable"

# -----------------------------------------------------------
# Guardrails (enforced only when security_mode == "hardened")
# -----------------------------------------------------------
guardrails:
  shell_exec:
    allowed_prefixes:
      - "ls"
      - "cat"
      - "grep"
      - "wc"
      - "head"
      - "tail"
      - "echo"
      - "date"
      - "whoami"

  file_ops:
    allowed_base_dirs:
      - "sessions/{session_id}/"
      - "skills/"

  session_isolation:
    enforce: true

  skill_modification:
    read_only: true

  db_query:
    # In hardened mode, query_user uses parameterized SQL
    # and rejects suspicious username values.
    sanitize_input: true

# -----------------------------------------------------------
# Tool toggles (enable/disable individual tools entirely)
# Note: LLM visibility is controlled by tools.allow, not here.
# These toggles disable tools at the registry level.
# -----------------------------------------------------------
tools:
  shell_exec: true
  read_file: true
  write_file: true
  list_dir: true
  save_memory: true
  search_memory: true
  list_skills: true
  load_skill: true
  update_skill: true
  send_message: true
  query_user: true
